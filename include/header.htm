<script>
    $(function(){
        toggleme($('a.mobilemenu'),$('body'),'MobileMenuOn');
		
		// 動態替換相對路徑以配合頁面深度 (支援 PATH_PREFIX)
		var prefix = (typeof window.PATH_PREFIX !== 'undefined') ? window.PATH_PREFIX : '../';
		
		// 如果是首頁 (.index) 且沒設 PATH_PREFIX，自動改為 ""
		if ($("header").hasClass("index") || $("footer").hasClass("index")) {
			if (typeof window.PATH_PREFIX === 'undefined') {
				prefix = "";
			}
		}

		$("header a[href^='../']").attr("href", function(_, oldHref) {
			return oldHref.replace(/^\.\.\//, prefix);
		});
		$("footer a[href^='../']").attr("href", function(_, oldHref) {
			return oldHref.replace(/^\.\.\//, prefix);
		});
		$("footer img[src^='../']").attr("src", function(_, oldSrc) {
			return oldSrc.replace(/^\.\.\//, prefix);
		});
		
		//wheelchange
		var s1 = 100;
		var newSet=[[s1,'scroll']];
		wheelchange($('.bodybox'), newSet);
    });
</script>
