<body>
 
  <header></header>
 
  <div class="bodybox projects">
   <div class="mainContent">
  <div class="container">
    <div class="pageTitle">
        <h1 class="title">Projects</h1>
        <p class="subtitle">Selected works in Design, Illustration, and Animation.</p>
    </div>
 
    <div class="projects-tabs">
        <ul class="tab-list">
          <li class="active" data-target="all">All Projects</li>
          <li data-target="logo-design">Logo Design</li>
          <li data-target="web-design">Web Design</li>
          <li data-target="illustration">Illustration</li>
          <li data-target="animation">Animation</li>
          <!-- <li data-target="photography">Photography</li> -->
        </ul>
    </div>

    <div class="category">
        <!-- Featured Works Section (displayed only when All Projects is active) -->
        <div class="subCategory" id="featured-works">
          <!-- <h3 class="title">Featured Works</h3> -->
          <div class="grid" id="grid-featured-works">
          </div>
        </div>

        <!-- All Projects List Section (displayed with pager) -->
        <div class="subCategory" id="all-works-list">
          <div class="grid" id="grid-all-works">
          </div>
          <div class="pager-wrap" id="all-works-pager">
          </div>
        </div>

        <div class="subCategory" id="logo-design">
          <div class="grid" id="grid-logo-design"></div>
        </div>
 
        <div class="subCategory" id="web-design">
          <div class="grid" id="grid-web-design"></div>
        </div>
    </div>
 
    <div class="category">
        <div class="subCategory" id="illustration">
          <div class="grid" id="grid-illustration"></div>
        </div>
    </div>
 
    <div class="category">
      <div class="subCategory" id="animation">
            <div class="grid" id="grid-animation"></div>
      </div>
    </div>
    
    <!-- Photography 區塊 (目前註解中，準備好後可將前後註解符號移除以顯示於前台)
    <div class="category">
      <div class="subCategory" id="photography">
        <div class="grid" id="grid-photography"></div>
      </div>
    </div>
    -->

  </div>
  </div>
  </div>

  <script>
    $(function() {
      function selectTab(target) {
        $('.projects-tabs .tab-list li').removeClass('active');
        $('.projects-tabs .tab-list li[data-target="' + target + '"]').addClass('active');
        
        // 隱藏所有分類容器，方便未來新增分類時無需修改這段 JS
        $('.subCategory').hide();
        
        if(target === 'all') {
          $('#featured-works, #all-works-list').fadeIn(300);
          
          if ($('#grid-featured-works .card').length === 0) {
            $('#featured-works').hide();
          }
          
          if (typeof window.renderAllWorksPage === 'function') {
            window.renderAllWorksPage(1);
          }
        } else {
          $('#' + target).fadeIn(300);
        }
      }

      function handleHash() {
        var hash = window.location.hash.substring(1);
        var validTargets = ['logo-design', 'web-design', 'illustration', 'animation', 'photography', 'all'];
        if (hash && validTargets.includes(hash)) {
          selectTab(hash);
          setTimeout(function() {
            var tabOffset = $('.tab-list').offset().top - 150;
            $('html, body').animate({ scrollTop: tabOffset }, 300);
          }, 100);
        } else {
          selectTab('all');
        }
      }

      handleHash();

      $(window).on('hashchange', function() {
        handleHash();
      });

      $('.projects-tabs .tab-list li').on('click', function() {
        var target = $(this).data('target');
        selectTab(target);
        
        if(target !== 'all') {
          history.replaceState(null, null, '#' + target);
        } else {
          history.replaceState(null, null, window.location.pathname + window.location.search);
        }
      });
    });
  </script>
 
  <footer></footer>
 
  <script type="text/javascript" src="../Js/index.js?v=1.0.1"></script>
</body>
</html>
